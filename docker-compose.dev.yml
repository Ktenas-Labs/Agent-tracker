# Hot-reload stack: merge with base compose
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Or: ./scripts/dev.sh
#
# Note: this overrides the backend image CMD (no auto-alembic). Run once:
#   docker compose exec backend alembic upgrade head

services:
  backend:
    volumes:
      - ./backend:/app
    command:
      - uvicorn
      - app.main:app
      - --reload
      - --host
      - "0.0.0.0"
      - --port
      - "8000"

  # Use Flutter SDK image for dev (production image is nginx-only — no flutter binary)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
