# Hot-reload stack: merge with base compose
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Or: ./scripts/dev.sh
#
# Note: this overrides the backend image CMD (no auto-alembic). Run once:
#   docker compose exec backend alembic upgrade head

services:
  backend:
    volumes:
      - ./backend:/app
    command:
      - uvicorn
      - app.main:app
      - --reload
      - --host
      - "0.0.0.0"
      - --port
      - "8000"

  frontend:
    volumes:
      - ./frontend:/app
    command:
      - bash
      - -lc
      - flutter pub get && flutter run -d web-server --web-port=8080 --web-hostname=0.0.0.0
