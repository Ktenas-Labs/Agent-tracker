name: Docker build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: agent-tracker-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend (Flutter web → nginx)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: agent-tracker-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
